<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; color: #333; line-height: 1.6; }
        .container { max-width: 600px; margin: 0 auto; border: 1px solid #eee; padding: 20px; }
        .header { background-color: #f8f9fa; padding: 10px 20px; border-bottom: 3px solid #007bff; margin-bottom: 20px; }
        .label { font-weight: bold; width: 120px; display: inline-block; color: #666; }
        .value { display: inline-block; }
        .section { margin-bottom: 15px; padding: 10px; border-bottom: 1px dashed #eee; }
        .footer { font-size: 12px; color: #999; margin-top: 30px; text-align: center; }
        .highlight { color: #d9534f; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>新規予約のお知らせ</h2>
        </div>
        
        <p>新しい予約が入りました。内容を確認してください。</p>

        <div class="section">
            <div><span class="label">お客様名：</span><span class="value">{{customer_name}}</span></div>
            <div><span class="label">お客様電話番号：</span><span class="value">{{customer_phone}}</span></div>
            <div><span class="label">お客様アドレス：</span><span class="value">{{customer_email}}</span></div>
            <div><span class="label">コース：</span><span class="value">{{course_name}}</span></div>
            <div><span class="label">人数：</span><span class="value">{{customer_count}}名</span></div>
            <div><span class="label">備考：</span><span class="value">{{customer_memo}}</span></div>
        </div>

        <div class="footer">
            <p>※本メールはシステムより自動送信されています。<br>
            管理画面から予約状況を確認してください。</p>
            <p>&copy; 2026 神奈川おでかけナビ All Rights Reserved.</p>
        </div>
    </div>
</body>
</html>
